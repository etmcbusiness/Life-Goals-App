<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>April - Lock In</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="scanlines"></div>
  <a class="dashboard-home-btn" href="index.html" aria-label="Back to dashboard">Dashboard</a>
  <button class="menu-btn" id="menuOpenBtn">☰</button>
  <div class="side-menu-overlay" id="sideMenuOverlay"></div>
  <aside class="side-menu" id="sideMenu">
    <button class="side-menu-close" id="menuCloseBtn">✕</button>
    <p class="section-label">PAGES</p>
    <a class="side-menu-link" href="index.html">Dashboard</a>
    <a class="side-menu-link" id="sideMenuCurrentMonthLink" href="month.html">Current Month</a>
    <a class="side-menu-link" href="analytics.html">Analytics</a>
    <p class="section-label side-menu-months-label" id="sideMenuMonthsLabel">MONTHS</p>
    <nav class="side-menu-months" id="sideMenuMonths" aria-label="Revenue by month"></nav>
  </aside>

  <div class="app-container">
    <div class="header">
      <p class="app-title">APRIL</p>
      <p class="step-label">April Revenue Progress</p>

      <div class="progress-section header-progress-section">
        <div class="progress-track">
          <div class="progress-fill-dual" id="aprilProgressDual">
            <div class="progress-fill-segment progress-fill--actual" id="aprilProgressActual"></div>
            <div class="progress-fill-segment progress-fill--estimated" id="aprilProgressEstimated"></div>
          </div>
        </div>
        <div class="progress-header">
          <p class="progress-label header-scale-label" id="aprilProgressMadeLabel">$0</p>
          <p class="progress-label header-scale-label">$10,000</p>
        </div>
      </div>
    </div>

    <div class="task-section">
      <div class="input-wrapper single-line">
        <span class="input-prefix">$</span>
        <input
          type="number"
          id="aprilRevenueInput"
          class="goal-input"
          placeholder="Enter revenue amount"
          min="0"
          step="0.01"
        />
      </div>
      <div class="input-wrapper single-line">
        <span class="input-prefix">&gt;</span>
        <input
          type="text"
          id="aprilRevenueLocationInput"
          class="goal-input"
          placeholder="Location"
          maxlength="120"
        />
      </div>
      <input type="hidden" id="aprilRevenueDateInput" />
      <div class="input-wrapper single-line date-picker-line">
        <span class="input-prefix">&gt;</span>
        <input
          type="text"
          readonly
          id="aprilRevenueDateDisplay"
          class="goal-input date-picker-readonly"
          placeholder="DATE"
          tabindex="0"
        />
        <button type="button" class="date-picker-trigger" id="aprilRevenueDateTrigger" aria-label="Open calendar">
          <span class="date-picker-icon" aria-hidden="true">📅</span>
        </button>
      </div>
      <div class="revenue-dropdown-row">
        <div class="custom-dropdown" id="aprilRevenueSourceDropdown">
          <button class="custom-dropdown-trigger" id="aprilRevenueSourceTrigger" type="button">
            <span class="input-prefix">&gt;</span>
            <span id="aprilRevenueSourceLabel">Select revenue source</span>
          </button>
          <div class="custom-dropdown-options" id="aprilRevenueSourceOptions">
            <button class="custom-dropdown-option" type="button" data-value="Janitorial Cleaning">Janitorial Cleaning</button>
            <button class="custom-dropdown-option" type="button" data-value="Window Cleaning">Window Cleaning</button>
            <button class="custom-dropdown-option" type="button" data-value="Other">Other</button>
          </div>
        </div>
        <div class="custom-dropdown" id="aprilRevenueKindDropdown">
          <button class="custom-dropdown-trigger" id="aprilRevenueKindTrigger" type="button">
            <span class="input-prefix">&gt;</span>
            <span id="aprilRevenueKindLabel">Revenue Type</span>
          </button>
          <div class="custom-dropdown-options" id="aprilRevenueKindOptions">
            <button class="custom-dropdown-option" type="button" data-value="actual">Actual Revenue</button>
            <button class="custom-dropdown-option" type="button" data-value="estimated">Estimated Revenue</button>
          </div>
        </div>
      </div>
      <div class="input-wrapper single-line hidden" id="aprilRevenueOtherWrapper">
        <span class="input-prefix">&gt;</span>
        <input
          type="text"
          id="aprilRevenueOtherInput"
          class="goal-input"
          placeholder="Type other revenue source"
          maxlength="120"
        />
      </div>
      <button class="add-btn" id="aprilRevenueEnterBtn">ENTER</button>
      <p class="progress-percent" id="aprilPercentLine">0%</p>
      <p class="confirm-value" id="revenueLineTotalActual">Actual revenue this month: $0.00</p>
      <p class="confirm-value" id="revenueLineTotalCombined">Actual + estimated this month: $0.00</p>
      <hr class="page-break-line" />
    </div>

    <div class="task-section">
      <p class="section-label">APRIL ENTRIES (LATEST FIRST)</p>
      <ul class="item-list" id="aprilEntriesList"></ul>
    </div>
  </div>

  <div class="modal-overlay" id="aprilEditModalOverlay">
    <div class="modal-box" id="aprilEditModalBox">
      <p class="modal-title">// EDIT APRIL ENTRY</p>

      <div class="input-wrapper single-line">
        <span class="input-prefix">$</span>
        <input type="number" id="editAmountInput" class="goal-input" min="0" step="0.01" />
      </div>

      <div class="input-wrapper single-line">
        <span class="input-prefix">&gt;</span>
        <input type="text" id="editLocationInput" class="goal-input" placeholder="Location" maxlength="120" />
      </div>

      <input type="hidden" id="editRevenueDateInput" />
      <div class="input-wrapper single-line date-picker-line">
        <span class="input-prefix">&gt;</span>
        <input
          type="text"
          readonly
          id="editRevenueDateDisplay"
          class="goal-input date-picker-readonly"
          placeholder="DATE"
          tabindex="0"
        />
        <button type="button" class="date-picker-trigger" id="editRevenueDateTrigger" aria-label="Open calendar">
          <span class="date-picker-icon" aria-hidden="true">📅</span>
        </button>
      </div>

      <div class="revenue-dropdown-row">
        <div class="custom-dropdown" id="editRevenueSourceDropdown">
          <button class="custom-dropdown-trigger" id="editRevenueSourceTrigger" type="button">
            <span class="input-prefix">&gt;</span>
            <span id="editRevenueSourceLabel">Select revenue source</span>
          </button>
          <div class="custom-dropdown-options" id="editRevenueSourceOptions">
            <button class="custom-dropdown-option" type="button" data-value="Janitorial Cleaning">Janitorial Cleaning</button>
            <button class="custom-dropdown-option" type="button" data-value="Window Cleaning">Window Cleaning</button>
            <button class="custom-dropdown-option" type="button" data-value="Other">Other</button>
          </div>
        </div>
        <div class="custom-dropdown" id="editRevenueKindDropdown">
          <button class="custom-dropdown-trigger" id="editRevenueKindTrigger" type="button">
            <span class="input-prefix">&gt;</span>
            <span id="editRevenueKindLabel">Revenue Type</span>
          </button>
          <div class="custom-dropdown-options" id="editRevenueKindOptions">
            <button class="custom-dropdown-option" type="button" data-value="actual">Actual Revenue</button>
            <button class="custom-dropdown-option" type="button" data-value="estimated">Estimated Revenue</button>
          </div>
        </div>
      </div>
      <div class="input-wrapper single-line hidden" id="editRevenueOtherWrapper">
        <span class="input-prefix">&gt;</span>
        <input
          type="text"
          id="editRevenueOtherInput"
          class="goal-input"
          placeholder="Type other revenue source"
          maxlength="120"
        />
      </div>

      <button class="add-btn" id="saveEditEntryBtn">[ SAVE CHANGES ]</button>
      <button class="back-btn-inline" id="cancelEditEntryBtn">✕ CANCEL</button>
    </div>
  </div>

  <script src="calendar-picker.js"></script>
  <script src="revenue-milestones.js"></script>
  <script src="april.js"></script>
  <script src="april-revenue.js"></script>
  <script src="menu.js"></script>
</body>
</html>
